<!DOCTYPE html>
<html>
<head>
    <title>YOUTUBE CLONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        p{
            font-family:Roboto,arial;
            margin-top:0px;
            margin-bottom:0px;
        }
        .thumbnail{
            width:300px;
            display:block;
        }
        .video-title{
            margin-top:0px;
            font-size:14px;
            font-weight:500;
            line-height:20px;
            margin-bottom:12px;
        }
        .video-stats{
            font-size:12px;
            color:rgb(96,96,96);
        }
        .video-author{
            display:block;
            font-size:12px;
            color:rgb(96,96,96);
            margin-bottom:5px;
        }
        
        .video-preview{
            width:300px;
            display:inline-block;
            vertical-align:top;
            margin-right:15px;
        }
        .search_bar{
            display:block;
        }
        .channel-picture{
            display:inline-block;
            width:50px;
            vertical-align: top;
            
        }
        .video-info{
            display:inline-block;
            width:200px;
        }
        .profile-picture{
            width:40px;
            border-radius:25px;
        }
        .Thumbnail-row{
            margin-bottom:12px;
        }
    </style>
</head>
<body>
    <input class="search_bar" type="text" placeholder="Search">
    <div class="video-preview">
    <div class="Thumbnail-row"> 
        <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
    </div>
    <div>
        <div class="channel-picture">
           <img class="profile-picture" src= "thumbnails/channel-1.jpeg"> 
        </div>
        <div class="video-info">
<p class="video-title">
        Talking Tech and AI with Google CEO Sundar Pichai!
    </p>
    <p class="video-author">
        Marques Brownlee
    </p>
    <p class="video-stats">
        3.4M views &#183; 6 months ago
    </p>
        </div>
         </div>
    
</div>
    
    
   
</body>
</html>
